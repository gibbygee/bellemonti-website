<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https://github.githubassets.com; frame-ancestors 'none'; form-action 'self'; base-uri 'self'">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  {% seo %}

  <meta property="og:image" content="{{ '/assets/images/logo.png' | absolute_url }}">
  <meta name="twitter:image" content="{{ '/assets/images/logo.png' | absolute_url }}">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ '/assets/images/favicon.ico' | relative_url }}">

  {% feed_meta %}
</head>
