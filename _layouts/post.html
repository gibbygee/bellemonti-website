---
layout: default
---

<article class="post" style="margin-top: 8px;">
  <div class="container">
    <nav style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
      {% if page.next %}
        <a href="{{ page.next.url | relative_url }}" style="color: #7f8c8d; text-decoration: none; font-size: 14px;" title="{{ page.next.title }}">
          ← back
        </a>
      {% else %}
        <span></span>
      {% endif %}
      {% if page.previous %}
        <a href="{{ page.previous.url | relative_url }}" style="color: #7f8c8d; text-decoration: none; font-size: 14px;" title="{{ page.previous.title }}">
          older →
        </a>
      {% endif %}
    </nav>
    <header class="post-header">
      <p class="text-secondary" style="margin-bottom: 8px;">
        <time datetime="{{ page.date | date_to_xmlschema }}">
          {{ page.date | date: "%B %d, %Y" }}
        </time>
        {% if page.author %}
          • {{ page.author }}
        {% endif %}
      </p>
      <h1 style="margin-bottom: 24px;">{{ page.title }}</h1>

    </header>

    <div class="post-content">
      {{ content }}
    </div>

    <footer class="post-footer" style="margin-top: 48px; padding-top: 32px; border-top: 1px solid #e1e4e8;">
      <a href="{{ '/blog/' | relative_url }}" style="color: #7f8c8d; text-decoration: none; font-size: 14px;">← back</a>
    </footer>
  </div>
</article>
