---
layout: default
---

<article class="post article">
  <div class="container">
    {% include article-nav.html %}

    <header class="post-header article-header">
      <p class="text-secondary article-date">
        <time datetime="{{ page.date | date_to_xmlschema }}">
          {{ page.date | date: "%B %d, %Y" }}
        </time>
        {% if page.author %}
          • {{ page.author }}
        {% endif %}
      </p>
      <h1>{{ page.title }}</h1>
    </header>

    <div class="post-content">
      {{ content }}
    </div>

    <footer class="post-footer article-footer">
      <a href="{{ '/blog/' | relative_url }}">← back</a>
    </footer>
  </div>
</article>
