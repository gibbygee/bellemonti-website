    - harness

- slug: belief-and-culture
  title: Belief and culture
  description: Why companies live or die on belief. Mission, agency, what gets remembered, gets done.
  narrative: |
    Process is downstream of product, product is downstream of culture, and [culture sets the ceiling](/binder/upstream-chain/) for everything else. Companies that lose the [WHY](/binder/why-problem/) lose their best people first - the narrative collapses, the missionaries leave, and the functionaries who replace them never quite get back the mojo. Belief is [the operating layer](/binder/belief/) - fragile, hard to build, easy to break.

    The signal of a company in trouble is rarely a missing feature - it's usually [eroded fundamentals](/binder/fundamentals-are-always-in/). Reclaiming growth and leadership is usually a renewal of the [origin story](/binder/back-story/) the habits and language that got you there in the first place.
  entries:
    - belief
    - upstream-chain
    - software-faith
    - why-problem
    - low-agency-virus
    - back-story

- slug: strategy
  title: Strategy
  description: Strategy is a series of choices. Strategy is structure. The trap of metrics. 
  narrative: |
    McChrystal had it right: [structure, not the plan, is the strategy](/binder/structure/). Distributed structure beats centralized plans every time. The hard part is that most software companies are run by [the wrong temperament for their mode](/binder/operators-investors/): investors when they need operators, operators when they need investors.

    The [metrics trap](/binder/metrics-trap/) is the most reliable killer - metrics become the product, users become an externality, and the cure is principles. Underneath all of it, [every exec at a software company has the same job](/binder/all-software-execs-have-the-same-job/): product. Forget that and the org carves into lanes, each locally optimized and collectively mediocre. Most companies aren't growing anyway - [maturity is the actual stage](/binder/as-good-as-it-gets/), and pretending otherwise is the cargo cult that kills companies.
  entries:
    - operators-investors
    - metrics-trap
    - structure
    - all-software-execs-have-the-same-job
    - as-good-as-it-gets

- slug: how-teams-run
  title: How teams run
  description: The mechanics of getting software orgs to function. Cadence, writing, attention, and the anti-patterns that wreck teams.
  narrative: |
    Teams don't run on time, they run on [attention](/binder/manage-attention-not-time/) - what your calendar is full of is what gets done. [Cadence](/binder/change-your-teams-clock/) determines the operating tempo: daily is executive, weekly is supervisory, monthly is once-removed. The job is to make work [visible](/binder/visibility/) through artifacts that can be reviewed and argued with, and to [write more than you talk](/binder/too-much-talking/) - meetings cement misunderstandings, writing forces clarity.

    The anti-patterns are reliable. [Agile became a program](/binder/agile/) and the philosophy got buried under ceremony, while engineering used the process to consolidate power. [Captive IT shops](/binder/beware-captive-it/) optimize for internal stakeholders and lose the discipline of an actual market. And snowflakes - one-of-a-kind custom implementations - are sclerosis disguised as flexibility.
  entries:
    - manage-attention-not-time
