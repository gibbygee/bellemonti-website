    - beware-captive-it

- slug: pm-craft
  title: The PM craft
  description: What product managers actually do. Judgment first, process last. Leadership at every level.
  narrative: |
    The job description of PM is mostly wrong. [Responsiveness is a trap](/binder/responsive-pms-are-the-worst/) - the responsive PM is the one whose roadmap is not prioritized for impact. [PM should probably be slow](/binder/maybe-pm-should-be-slow/), the point being to build the right thing, which in practice often means avoiding building the wrong things. 

    What good PMs actually do is [staff work](/binder/staff-work/): painstaking synthesis. They [ship more](/binder/ship-more/) because the pace of shipment drives the pace of learning. They don't [argue in doc comments](/binder/responding-in-comments/) - they let the writing talk. They [repeat the strategy until people mock the delivery](/binder/repetition-and-persuasion/), because the craft is persuasion. And they understand that [the roadmap is a story](/binder/a-roadmap-is-a-story/) - it's how the strategy becomes visible to the people executing it.
