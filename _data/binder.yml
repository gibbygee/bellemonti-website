- slug: nature-of-software
  title: The nature of software
  description: The peculiarity of the software business. Accumulation, fragility, repeat economics. 
  narrative: |
    Software [accumulates](/binder/software-is-cumulative/) - every line shipped stays, and maintenance compounds like debt. Confusing that for inefficiency is a [category error](/binder/software-is-mostly-not-waste/); the real waste is local optimization without coherence. Silo'd CFOs miss the [physics underneath](/binder/financial-physics/), which is why so many software companies break under their own weight. The companies that survive understand they are [fragile dandelions](/binder/software-faith/) - belief is the operating system, not capital.

    The work itself is not exotic. [Most teams fail at the basics](/binder/not-complex-simple/), not for lack of process or "best practices." The compounding advantage comes from [platforms](/binder/platforms/) - the first product pays the freight, and every product after goes faster. The same principle holds in AI: [the model is interchangeable](/binder/harness/); the scaffold creates the value.
  entries:
    - financial-physics
    - software-is-cumulative
    - software-is-mostly-not-waste
