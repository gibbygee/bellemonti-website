    - platforms
    - harness

- slug: belief-and-culture
  title: Belief and culture
  description: Why companies live or die on belief. Mission, agency, what gets remembered, what gets rewarded.
  narrative: |
    Process is downstream of product, product is downstream of culture, and [culture sets the ceiling](/binder/upstream-chain/) for everything else. Companies that lose the [WHY](/binder/why-problem/) lose their best people first - the narrative collapses, the missionaries leave, and the mercenaries who replace them never quite get it back. Belief is [the operating layer](/binder/belief/) - fragile, hard to build, easy to break.

    Not everyone is a high-agency self-starter. The empowerment narrative is a [narcotic for the few and abandonment for the many](/binder/low-agency-virus/); structure is the cure, not better hiring. The signal of a company in trouble is rarely a missing feature - it's usually [eroded fundamentals](/binder/fundamentals-are-always-in/). And every company carries its [origin story](/binder/back-story/) in its habits and language, whether anyone notices or not.
  entries:
