- slug: nature-of-software
  title: The nature of software
  description: What software actually is and how it behaves. Accumulation, fragility, economics, and the AI scaffold.
  narrative: |
    Software [accumulates](/binder/software-is-cumulative/) - every line shipped stays, and maintenance compounds like debt. Confusing that for inefficiency is a [category error](/binder/software-is-mostly-not-waste/); the real waste is local optimization without a unifying yardstick. CFOs miss the [physics underneath](/binder/financial-physics/), which is why so many software companies break under their own weight. The companies that survive understand they are [fragile dandelions](/binder/software-faith/) - belief is the operating system, not capital.

    The work itself is not exotic. [Most teams fail at the basics](/binder/not-complex-simple/), not for lack of advanced technique. The compounding advantage comes from [platforms](/binder/platforms/) - the first product pays the freight, and every product after goes faster. The same principle holds in AI: [the model is interchangeable](/binder/harness/); the scaffold around it is what creates the value.
  entries:
    - software-is-cumulative
    - software-is-mostly-not-waste
    - financial-physics
    - software-faith
